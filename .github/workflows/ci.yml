name: CI

on:
  push:
    branches: [master, main, design-upgrade]
  pull_request:
    branches: [master, main, design-upgrade]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Client bundle secret scan (SEC-04)
        run: node scripts/ci-scan-client.mjs
