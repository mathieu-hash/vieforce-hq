<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VieForce HQ — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(135deg, #003350 0%, #004D71 40%, #00395a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 24px;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-logo-box {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 80px;
      height: 80px;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      margin-bottom: 16px;
    }

    .login-logo-box span {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 2px;
      color: #F1B11D;
    }

    .login-title {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .login-subtitle {
      font-size: 13px;
      font-weight: 400;
      opacity: 0.6;
      letter-spacing: 0.5px;
    }

    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 32px 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .login-card h2 {
      color: #004D71;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 24px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 14px;
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s;
      color: #333;
    }

    .form-group input:focus {
      border-color: #00A6CE;
      box-shadow: 0 0 0 3px rgba(0,166,206,0.1);
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: #004D71;
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 8px;
    }

    .login-btn:hover {
      background: #003a57;
    }

    .login-btn:active {
      transform: scale(0.98);
    }

    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .login-error {
      display: none;
      background: #fff0f0;
      color: #c0392b;
      font-size: 13px;
      font-weight: 500;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 16px;
      text-align: center;
    }

    .login-error.visible {
      display: block;
    }

    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 11px;
      opacity: 0.4;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-logo">
      <div class="login-logo-box"><span>HQ</span></div>
      <div class="login-title">VieForce HQ</div>
      <div class="login-subtitle">Vienovo Philippines Inc.</div>
    </div>

    <div class="login-card">
      <h2>Sign In</h2>
      <div class="login-error" id="loginError"></div>

      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" placeholder="09XX XXX XXXX" required>
        </div>
        <div class="form-group">
          <label for="pin">PIN</label>
          <input type="password" id="pin" placeholder="Enter PIN" maxlength="6" required>
        </div>
        <button type="submit" class="login-btn" id="loginBtn">Sign In</button>
      </form>
    </div>

    <div class="login-footer">Sales Intelligence &middot; VieForce HQ v1.0</div>
  </div>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // If already logged in, redirect
    if (getSession()) {
      window.location.href = 'app.html';
    }

    var form = document.getElementById('loginForm');
    var errorEl = document.getElementById('loginError');
    var btn = document.getElementById('loginBtn');

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      errorEl.classList.remove('visible');
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      var phone = document.getElementById('phone').value.trim();
      var pin = document.getElementById('pin').value.trim();

      var result = await login(phone, pin);

      if (result.ok) {
        window.location.href = 'app.html';
      } else {
        errorEl.textContent = result.error;
        errorEl.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
